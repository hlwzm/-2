<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>指尖江湖2 - 后台管理系统</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0a0a14; color: #c0c0d0; }
.sidebar { position: fixed; left: 0; top: 0; bottom: 0; width: 200px; background: #0d0d1a; border-right: 1px solid #1a1a2e; overflow-y: auto; z-index: 100; }
.sidebar .logo { padding: 20px 16px; font-size: 18px; font-weight: 700; color: #b088ff; border-bottom: 1px solid #1a1a2e; }
.sidebar .logo small { display: block; font-size: 11px; font-weight: 400; color: #666; margin-top: 2px; }
.sidebar nav { padding: 8px 0; }
.sidebar nav a { display: block; padding: 10px 16px; color: #888; text-decoration: none; font-size: 13px; cursor: pointer; transition: all .15s; }
.sidebar nav a:hover, .sidebar nav a.active { color: #b088ff; background: rgba(176,136,255,.08); border-left: 3px solid #b088ff; }
.sidebar nav a .badge { float: right; background: #e74c3c; color: #fff; font-size: 10px; padding: 1px 6px; border-radius: 8px; }
.main { margin-left: 200px; padding: 20px 24px; min-height: 100vh; }
.header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
.header h1 { font-size: 22px; color: #e0e0f0; }
.header .status { font-size: 12px; color: #888; }
.card { background: #12121e; border: 1px solid #1e1e32; border-radius: 10px; padding: 18px; margin-bottom: 16px; }
.card h3 { font-size: 14px; color: #888; margin-bottom: 4px; }
.card .value { font-size: 28px; font-weight: 700; color: #f0f0ff; }
.card .sub { font-size: 12px; color: #666; margin-top: 2px; }
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(190px, 1fr)); gap: 12px; margin-bottom: 20px; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th { text-align: left; padding: 10px 8px; color: #888; font-weight: 600; border-bottom: 1px solid #1e1e32; font-size: 12px; text-transform: uppercase; letter-spacing: .5px; }
td { padding: 8px; border-bottom: 1px solid #181828; }
tr:hover td { background: rgba(176,136,255,.04); }
.btn { display: inline-block; padding: 6px 14px; border: none; border-radius: 6px; font-size: 12px; cursor: pointer; transition: all .15s; }
.btn-primary { background: #b088ff; color: #fff; }
.btn-primary:hover { background: #9a6ff0; }
.btn-danger { background: #e74c3c; color: #fff; }
.btn-danger:hover { background: #c0392b; }
.btn-sm { padding: 4px 10px; font-size: 11px; }
.btn-warning { background: #f39c12; color: #fff; }
.btn-success { background: #27ae60; color: #fff; }
.btn-outline { background: transparent; border: 1px solid #333; color: #888; }
.btn-outline:hover { border-color: #b088ff; color: #b088ff; }
.pagination { display: flex; align-items: center; gap: 8px; margin-top: 12px; font-size: 12px; }
.pagination span { color: #666; }
.search-bar { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
.search-bar input, .search-bar select { background: #0d0d1a; border: 1px solid #1e1e32; border-radius: 6px; padding: 7px 12px; color: #c0c0d0; font-size: 13px; outline: none; }
.search-bar input:focus, .search-bar select:focus { border-color: #b088ff; }
.search-bar input { min-width: 160px; }
.search-bar select { min-width: 100px; }
.modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,.7); z-index: 200; justify-content: center; align-items: center; }
.modal-overlay.show { display: flex; }
.modal { background: #12121e; border: 1px solid #1e1e32; border-radius: 12px; padding: 24px; max-width: 600px; width: 90%; max-height: 80vh; overflow-y: auto; }
.modal h2 { color: #e0e0f0; margin-bottom: 16px; font-size: 18px; }
.modal label { display: block; font-size: 12px; color: #888; margin: 12px 0 4px; }
.modal input, .modal textarea, .modal select { width: 100%; background: #0d0d1a; border: 1px solid #1e1e32; border-radius: 6px; padding: 8px 12px; color: #c0c0d0; font-size: 13px; outline: none; }
.modal input:focus, .modal textarea:focus, .modal select:focus { border-color: #b088ff; }
.modal textarea { min-height: 60px; resize: vertical; }
.modal .btn-row { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }
.tag { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; }
.tag-success { background: rgba(39,174,96,.15); color: #27ae60; }
.tag-danger { background: rgba(231,76,60,.15); color: #e74c3c; }
.tag-warning { background: rgba(243,156,18,.15); color: #f39c12; }
.tag-info { background: rgba(52,152,219,.15); color: #3498db; }
.tabs { display: flex; gap: 0; margin-bottom: 16px; border-bottom: 1px solid #1e1e32; }
.tabs .tab { padding: 10px 20px; cursor: pointer; color: #666; font-size: 13px; border-bottom: 2px solid transparent; transition: all .15s; }
.tabs .tab.active { color: #b088ff; border-bottom-color: #b088ff; }
.tabs .tab:hover { color: #b088ff; }
.quality-1 { color: #888; } .quality-2 { color: #27ae60; } .quality-3 { color: #3498db; } .quality-4 { color: #b088ff; } .quality-5 { color: #f39c12; }
.toast { position: fixed; top: 20px; right: 20px; background: #1a1a2e; border: 1px solid #b088ff; color: #e0e0f0; padding: 12px 20px; border-radius: 8px; font-size: 13px; z-index: 300; display: none; animation: slideIn .3s; }
@keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
.empty { text-align: center; padding: 40px; color: #555; font-size: 14px; }
.chart-bar { display: flex; align-items: flex-end; gap: 6px; height: 120px; padding: 10px 0; }
.chart-bar .bar { flex: 1; background: linear-gradient(to top, #b088ff, #d4b0ff); border-radius: 4px 4px 0 0; min-height: 2px; position: relative; transition: height .5s; }
.chart-bar .bar .label { position: absolute; bottom: -18px; left: 50%; transform: translateX(-50%); font-size: 10px; color: #666; white-space: nowrap; }
.chart-bar .bar .val { position: absolute; top: -16px; left: 50%; transform: translateX(-50%); font-size: 10px; color: #b088ff; }
@media (max-width: 768px) {
  .sidebar { width: 50px; }
  .sidebar .logo span { display: none; }
  .sidebar nav a span { display: none; }
  .main { margin-left: 50px; padding: 12px; }
  .grid { grid-template-columns: repeat(2, 1fr); }
}
</style>
</head>
<body>
<div class="sidebar">
  <div class="logo">🦊 <span>指尖江湖2</span><small>管理后台</small></div>
  <nav>
    <a onclick="switchPage('dashboard')" class="active" id="nav-dashboard">📊 <span>总览</span></a>
    <a onclick="switchPage('users')" id="nav-users">👥 <span>用户管理</span></a>
    <a onclick="switchPage('logs')" id="nav-logs">📋 <span>操作日志</span></a>
    <a onclick="switchPage('trade')" id="nav-trade">🏪 <span>交易监控</span></a>
    <a onclick="switchPage('mail')" id="nav-mail">✉️ <span>邮件系统</span></a>
    <a onclick="switchPage('items')" id="nav-items">🎁 <span>物品发放</span></a>
    <a onclick="switchPage('currency')" id="nav-currency">💰 <span>货币修改</span></a>
    <a onclick="switchPage('reports')" id="nav-reports">🚨 <span>举报管理</span></a>
    <a onclick="switchPage('dungeon')" id="nav-dungeon">🏰 <span>副本统计</span></a>
    <a onclick="switchPage('server')" id="nav-server">🖥️ <span>服务器</span></a>
    <a onclick="switchPage('stats')" id="nav-stats">📈 <span>数据统计</span></a>
    <a onclick="switchPage('announce')" id="nav-announce">📢 <span>公告管理</span></a>
  </nav>
</div>
<div class="main" id="main-content"></div>
<div class="modal-overlay" id="modalOverlay"><div class="modal" id="modalContent"></div></div>
<div class="toast" id="toast"></div>
<script>
let currentPage = 'dashboard';
const API_BASE = '';

function $(id) { return document.getElementById(id); }
function toast(msg, ok) { var t = $('toast'); t.style.display = 'block'; t.style.borderColor = ok ? '#27ae60' : '#e74c3c'; t.textContent = msg; setTimeout(function() { t.style.display = 'none'; }, 3000); }
function showModal(html) { $('modalOverlay').classList.add('show'); $('modalContent').innerHTML = html; }
function closeModal() { $('modalOverlay').classList.remove('show'); }
$('modalOverlay').addEventListener('click', function(e) { if (e.target === this) closeModal(); });
function switchPage(page) {
  currentPage = page;
  document.querySelectorAll('.sidebar nav a').forEach(function(a) { a.classList.remove('active'); });
  var nav = $('nav-' + page); if (nav) nav.classList.add('active');
  loadPage(page);
}
function loadPage(page) {
  var main = $('main-content');
  switch (page) {
    case 'dashboard': loadDashboard(main); break;
    case 'users': loadUsers(main); break;
    case 'logs': loadLogs(main); break;
    case 'trade': loadTrade(main); break;
    case 'mail': loadMail(main); break;
    case 'items': loadItems(main); break;
    case 'currency': loadCurrency(main); break;
    case 'reports': loadReports(main); break;
    case 'dungeon': loadDungeon(main); break;
    case 'server': loadServer(main); break;
    case 'stats': loadStats(main); break;
    case 'announce': loadAnnounce(main); break;
    default: main.innerHTML = '<div class="empty">页面未找到</div>';
  }
}
function api(path, opts) {
  var url = API_BASE + '/api' + path;
  if (opts && opts.query) {
    var qs = Object.keys(opts.query).map(function(k) {
      if (opts.query[k] === undefined || opts.query[k] === null || opts.query[k] === '') return '';
      return encodeURIComponent(k) + '=' + encodeURIComponent(opts.query[k]);
    }).filter(function(s) { return s !== ''; }).join('&');
    if (qs) url += '?' + qs;
  }
  return fetch(url, opts && opts.method ? { method: opts.method, headers: opts.headers || { 'Content-Type': 'application/json' }, body: opts.body } : {}).then(function(r) { return r.json(); });
}
function escapeHtml(s) { if (s === null || s === undefined) return ''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

/* ═══════════ DASHBOARD ═══════════ */
function loadDashboard(el) {
  el.innerHTML = '<div class="empty">加载中...</div>';
  api('/dashboard').then(function(d) {
    var html = '<div class="header"><h1>📊 运营总览</h1><div class="status">🕐 ' + escapeHtml(d.serverTime) + ' &nbsp; 运行 ' + escapeHtml(d.uptime) + '</div></div>';
    html += '<div class="grid">';
    var cards = [
      { label:'在线玩家', val:d.onlinePlayers, sub:'当前在线', icon:'🟢' },
      { label:'注册用户', val:d.totalUsers, sub:'累计注册', icon:'👥' },
      { label:'今日登录', val:d.todayLogins, sub:'24小时', icon:'🔑' },
      { label:'今日聊天', val:d.todayChats, sub:'消息数', icon:'💬' },
      { label:'今日交易', val:d.todayTrades, sub:'笔数', icon:'🛒' },
      { label:'交易总额', val:d.tradeVolume.toLocaleString(), sub:'金币', icon:'💰' },
      { label:'通关副本', val:d.dungeonClears, sub:'今日', icon:'🏰' },
      { label:'今日PVP', val:d.todayPvp, sub:'场次', icon:'⚔️' },
      { label:'封禁人数', val:d.bannedCount, sub:'累计', icon:'🔨' },
      { label:'今日帮会', val:d.todayGuild, sub:'操作数', icon:'🏴' }
    ];
    cards.forEach(function(c) {
      html += '<div class="card"><h3>' + c.icon + ' ' + c.label + '</h3><div class="value">' + c.val + '</div><div class="sub">' + c.sub + '</div></div>';
    });
    html += '</div>';
    html += '<div class="card"><h3>⚡ 快捷操作</h3><div style="margin-top:10px;display:flex;gap:8px;flex-wrap:wrap;">';
    html += '<button class="btn btn-primary" onclick="switchPage('users')">👥 用户管理</button>';
    html += '<button class="btn btn-warning" onclick="switchPage('logs')">📋 操作日志</button>';
    html += '<button class="btn btn-success" onclick="switchPage('trade')">🏪 交易监控</button>';
    html += '<button class="btn btn-outline" onclick="switchPage('server')">🖥️ 服务器状态</button>';
    html += '</div></div>';
    el.innerHTML = html;
  }).catch(function(e) { el.innerHTML = '<div class="empty">❌ 加载失败: ' + escapeHtml(e.message) + '</div>'; });
}

/* ═══════════ USERS ═══════════ */
var userState = { page: 1, search: '', status: '', levelMin: '', levelMax: '', vip: '' };
function loadUsers(el) {
  el.innerHTML = '<div class="header"><h1>👥 用户管理</h1></div>' +
    '<div class="search-bar">' +
    '<input id="uSearch" placeholder="搜索ID/昵称..." value="' + escapeHtml(userState.search) + '" onkeydown="if(event.key=='Enter') searchUsers()">' +
    '<select id="uStatus"><option value="">全部状态</option><option value="banned" ' + (userState.status=='banned'?'selected':'') + '>已封禁</option><option value="normal" ' + (userState.status=='normal'?'selected':'') + '>正常</option></select>' +
    '<input id="uLevelMin" placeholder="最低等级" style="width:80px" value="' + escapeHtml(userState.levelMin) + '">' +
    '<input id="uLevelMax" placeholder="最高等级" style="width:80px" value="' + escapeHtml(userState.levelMax) + '">' +
    '<select id="uVip"><option value="">VIP状态</option><option value="1" ' + (userState.vip=='1'?'selected':'') + '>VIP</option><option value="0" ' + (userState.vip=='0'?'selected':'') + '>普通</option></select>' +
    '<button class="btn btn-primary" onclick="searchUsers()">🔍 搜索</button>' +
    '<button class="btn btn-outline" onclick="resetUserSearch()">重置</button>' +
    '</div><div id="userList"><div class="empty">加载中...</div></div>';
  doUserSearch(1);
}
function searchUsers() {
  userState.search = $('uSearch').value;
  userState.status = $('uStatus').value;
  userState.levelMin = $('uLevelMin').value;
  userState.levelMax = $('uLevelMax').value;
  userState.vip = $('uVip').value;
  doUserSearch(1);
}
function resetUserSearch() {
  userState = { page: 1, search: '', status: '', levelMin: '', levelMax: '', vip: '' };
  $('uSearch').value = ''; $('uStatus').value = ''; $('uLevelMin').value = ''; $('uLevelMax').value = ''; $('uVip').value = '';
  doUserSearch(1);
}
function doUserSearch(page) {
  userState.page = page;
  var q = { page: page, search: userState.search || undefined, status: userState.status || undefined };
  if (userState.levelMin) q.levelMin = userState.levelMin;
  if (userState.levelMax) q.levelMax = userState.levelMax;
  if (userState.vip === '1') q.vip = '1';
  api('/users', { query: q }).then(function(d) {
    var html = '<table><thead><tr><th>ID</th><th>昵称</th><th>等级</th><th>金币</th><th>钻石</th><th>VIP</th><th>PVP分</th><th>状态</th><th>注册时间</th><th>操作</th></tr></thead><tbody>';
    if (d.items && d.items.length > 0) {
      d.items.forEach(function(u) {
        html += '<tr><td>' + u.playerId + '</td><td><strong>' + escapeHtml(u.playerName) + '</strong></td><td>' + u.level + '</td><td>' + u.gold.toLocaleString() + '</td><td>' + u.gem.toLocaleString() + '</td>';
        html += '<td>' + (u.vip ? '<span class="tag tag-warning">VIP</span>' : '-') + '</td>';
        html += '<td>' + u.pvpScore + '</td>';
        html += '<td>' + (u.isBanned ? '<span class="tag tag-danger">封禁</span>' : '<span class="tag tag-success">正常</span>') + '</td>';
        html += '<td style="font-size:11px;color:#888">' + escapeHtml(u.regDate) + '</td>';
        html += '<td style="white-space:nowrap">';
        html += '<button class="btn btn-sm btn-outline" onclick="viewUser(' + u.playerId + ')">详情</button> ';
        if (u.isBanned) html += '<button class="btn btn-sm btn-success" onclick="unbanUser(' + u.playerId + ')">解封</button>';
        else html += '<button class="btn btn-sm btn-danger" onclick="banUser(' + u.playerId + ')">封禁</button>';
        html += '</td></tr>';
      });
    } else { html += '<tr><td colspan="10" class="empty">暂无数据</td></tr>'; }
    html += '</tbody></table>';
    var totalPages = Math.ceil(d.total / d.pageSize) || 1;
    html += '<div class="pagination"><button class="btn btn-sm btn-outline" onclick="doUserSearch(' + (page - 1) + ')" ' + (page <= 1 ? 'disabled style="opacity:.4"' : '') + '>上一页</button>';
    html += '<span>第 ' + page + ' / ' + totalPages + ' 页 (共' + d.total + '条)</span>';
    html += '<button class="btn btn-sm btn-outline" onclick="doUserSearch(' + (page + 1) + ')" ' + (page >= totalPages ? 'disabled style="opacity:.4"' : '') + '>下一页</button></div>';
    $('userList').innerHTML = html;
  }).catch(function(e) { $('userList').innerHTML = '<div class="empty">❌ ' + escapeHtml(e.message) + '</div>'; });
}
function viewUser(id) {
  api('/users/' + id).then(function(u) {
    var html = '<h2>📋 ' + escapeHtml(u.playerName) + ' 详情</h2>';
    html += '<table><tbody>';
    var fields = [
      ['ID', u.playerId], ['昵称', u.playerName], ['等级', u.level], ['经验', u.exp],
      ['金币', u.gold.toLocaleString()], ['钻石', u.gem.toLocaleString()], ['贡献', u.tribute],
      ['PVP分数', u.pvpScore], ['PVP段位', u.pvpRank],
      ['VIP', u.vip ? '是' : '否'], ['封禁', u.isBanned ? '是' : '否'],
      ['注册日期', u.regDate], ['上次登录', u.lastLogin]
    ];
    fields.forEach(function(f) {
      html += '<tr><td style="color:#888;width:100px">' + f[0] + '</td><td>' + escapeHtml(String(f[1])) + '</td></tr>';
    });
    html += '</tbody></table>';
    html += '<div class="btn-row"><button class="btn btn-outline" onclick="closeModal()">关闭</button></div>';
    showModal(html);
  }).catch(function(e) { toast('加载用户详情失败: ' + e.message, false); });
}
function banUser(id) {
  var reason = prompt('输入封禁原因:');
  if (!reason) return;
  api('/users/' + id + '/ban', { method: 'POST', body: JSON.stringify({ reason: reason }) }).then(function(r) {
    toast(r.msg || '已封禁', true);
    doUserSearch(userState.page);
  }).catch(function(e) { toast('封禁失败: ' + e.message, false); });
}
function unbanUser(id) {
  if (!confirm('确定解封该用户？')) return;
  api('/users/' + id + '/unban', { method: 'POST' }).then(function(r) {
    toast(r.msg || '已解封', true);
    doUserSearch(userState.page);
  }).catch(function(e) { toast('解封失败: ' + e.message, false); });
}

/* ═══════════ LOGS ═══════════ */
var logState = { page: 1, playerId: '', actionType: '', startDate: '', endDate: '' };
function loadLogs(el) {
  el.innerHTML = '<div class="header"><h1>📋 操作日志</h1></div>' +
    '<div class="search-bar">' +
    '<input id="lPlayer" placeholder="玩家ID" value="' + escapeHtml(logState.playerId) + '" onkeydown="if(event.key=='Enter') searchLogs()">' +
    '<select id="lType"><option value="">全部类型</option></select>' +
    '<input id="lStart" type="date" value="' + escapeHtml(logState.startDate) + '">' +
    '<input id="lEnd" type="date" value="' + escapeHtml(logState.endDate) + '">' +
    '<button class="btn btn-primary" onclick="searchLogs()">🔍 搜索</button>' +
    '<button class="btn btn-outline" onclick="resetLogSearch()">重置</button>' +
    '</div><div id="logList"><div class="empty">加载中...</div></div>';
  api('/logs/types').then(function(types) {
    var sel = $('lType');
    sel.innerHTML = '<option value="">全部类型</option>';
    types.forEach(function(t) { sel.innerHTML += '<option value="' + escapeHtml(t) + '" ' + (logState.actionType === t ? 'selected' : '') + '>' + escapeHtml(t) + '</option>'; });
    doLogSearch(1);
  }).catch(function() { doLogSearch(1); });
}
function searchLogs() {
  logState.playerId = $('lPlayer').value;
  logState.actionType = $('lType').value;
  logState.startDate = $('lStart').value;
  logState.endDate = $('lEnd').value;
  doLogSearch(1);
}
function resetLogSearch() {
  logState = { page: 1, playerId: '', actionType: '', startDate: '', endDate: '' };
  $('lPlayer').value = ''; $('lStart').value = ''; $('lEnd').value = '';
  var sel = $('lType'); if (sel) sel.value = '';
  doLogSearch(1);
}
function doLogSearch(page) {
  logState.page = page;
  var q = { page: page, pageSize: 25, playerId: logState.playerId || undefined, actionType: logState.actionType || undefined };
  if (logState.startDate) q.startDate = logState.startDate;
  if (logState.endDate) q.endDate = logState.endDate;
  api('/logs', { query: q }).then(function(d) {
    var html = '<table><thead><tr><th>ID</th><th>玩家ID</th><th>玩家名</th><th>类型</th><th>详情</th><th>时间</th><th>IP</th></tr></thead><tbody>';
    if (d.items && d.items.length > 0) {
      d.items.forEach(function(l) {
        html += '<tr><td>' + l.id + '</td><td>' + l.playerId + '</td><td>' + escapeHtml(l.playerName) + '</td>';
        html += '<td><span class="tag tag-info">' + escapeHtml(l.actionType) + '</span></td>';
        html += '<td style="max-width:300px;overflow:hidden;text-overflow:ellipsis">' + escapeHtml(l.detail) + '</td>';
        html += '<td style="font-size:11px;color:#888">' + escapeHtml(l.timestamp) + '</td>';
        html += '<td style="font-size:11px;color:#555">' + escapeHtml(l.ipAddress || '-') + '</td></tr>';
      });
    } else { html += '<tr><td colspan="7" class="empty">暂无日志</td></tr>'; }
    html += '</tbody></table>';
    var totalPages = Math.ceil(d.total / d.pageSize) || 1;
    html += '<div class="pagination"><button class="btn btn-sm btn-outline" onclick="doLogSearch(' + (page - 1) + ')" ' + (page <= 1 ? 'disabled style="opacity:.4"' : '') + '>上一页</button>';
    html += '<span>第 ' + page + ' / ' + totalPages + ' 页 (共' + d.total + '条)</span>';
    html += '<button class="btn btn-sm btn-outline" onclick="doLogSearch(' + (page + 1) + ')" ' + (page >= totalPages ? 'disabled style="opacity:.4"' : '') + '>下一页</button></div>';

/* ═══════════ TRADE ═══════════ */
var tradeState = { page: 1, search: '', quality: '' };
function loadTrade(el) {
  el.innerHTML = '<div class="header"><h1>🏪 交易行监控</h1></div>' +
    '<div class="search-bar">' +
    '<input id="tSearch" placeholder="搜索物品..." value="' + escapeHtml(tradeState.search) + '" onkeydown="if(event.key=='Enter') searchTrade()">' +
    '<select id="tQuality"><option value="">全部品质</option><option value="1" ' + (tradeState.quality=='1'?'selected':'') + '>⭐ 普通</option><option value="2" ' + (tradeState.quality=='2'?'selected':'') + '>⭐⭐ 优秀</option><option value="3" ' + (tradeState.quality=='3'?'selected':'') + '>⭐⭐⭐ 精良</option><option value="4" ' + (tradeState.quality=='4'?'selected':'') + '>⭐⭐⭐⭐ 史诗</option><option value="5" ' + (tradeState.quality=='5'?'selected':'') + '>⭐⭐⭐⭐⭐ 传说</option></select>' +
    '<button class="btn btn-primary" onclick="searchTrade()">🔍 搜索</button>' +
    '<button class="btn btn-outline" onclick="resetTradeSearch()">重置</button>' +
    '</div><div id="tradeList"><div class="empty">加载中...</div></div>';
  doTradeSearch(1);
}
function searchTrade() { tradeState.search = $('tSearch').value; tradeState.quality = $('tQuality').value; doTradeSearch(1); }
function resetTradeSearch() { tradeState = { page: 1, search: '', quality: '' }; $('tSearch').value = ''; $('tQuality').value = ''; doTradeSearch(1); }
function doTradeSearch(page) {
  tradeState.page = page;
  var q = { page: page, pageSize: 25, search: tradeState.search || undefined };
  if (tradeState.quality) q.quality = tradeState.quality;
  api('/trade/listings', { query: q }).then(function(d) {
    var html = '<table><thead><tr><th>ID</th><th>卖家</th><th>物品</th><th>品质</th><th>数量</th><th>单价</th><th>总价</th><th>剩余</th><th>上架时间</th><th>操作</th></tr></thead><tbody>';
    if (d.items && d.items.length > 0) {
      d.items.forEach(function(t) {
        var qClass = 'quality-' + t.itemQuality;
        var stars = ''; for (var i = 0; i < t.itemQuality; i++) stars += '⭐';
        html += '<tr><td>' + t.id + '</td><td>' + escapeHtml(t.sellerName) + '</td>';
        html += '<td><span class="' + qClass + '">' + escapeHtml(t.itemName) + '</span></td>';
        html += '<td>' + stars + '</td><td>' + t.count + '</td>';
        html += '<td>' + t.unitPrice.toLocaleString() + '</td><td>' + t.totalPrice.toLocaleString() + '</td>';
        html += '<td>' + (t.remainingHours > 0 ? t.remainingHours + '小时' : '<span class="tag tag-danger">已过期</span>') + '</td>';
        html += '<td style="font-size:11px;color:#888">' + escapeHtml(t.listedAt) + '</td>';
        html += '<td><button class="btn btn-sm btn-danger" onclick="delistTrade(' + t.id + ')">下架</button></td></tr>';
      });
    } else { html += '<tr><td colspan="10" class="empty">暂无交易</td></tr>'; }
    html += '</tbody></table>';
    var totalPages = Math.ceil(d.total / d.pageSize) || 1;
    html += '<div class="pagination"><button class="btn btn-sm btn-outline" onclick="doTradeSearch(' + (page - 1) + ')" ' + (page <= 1 ? 'disabled style="opacity:.4"' : '') + '>上一页</button>';
    html += '<span>第 ' + page + ' / ' + totalPages + ' 页 (共' + d.total + '条)</span>';
    html += '<button class="btn btn-sm btn-outline" onclick="doTradeSearch(' + (page + 1) + ')" ' + (page >= totalPages ? 'disabled style="opacity:.4"' : '') + '>下一页</button></div>';
    $('tradeList').innerHTML = html;
  }).catch(function(e) { $('tradeList').innerHTML = '<div class="empty">❌ ' + escapeHtml(e.message) + '</div>'; });
}
function delistTrade(id) {
  if (!confirm('确定强制下架该物品？')) return;
  api('/trade/listings/' + id, { method: 'DELETE' }).then(function(r) {
    toast(r.msg, r.code === 0);
    doTradeSearch(tradeState.page);
  }).catch(function(e) { toast('操作失败: ' + e.message, false); });
}

/* ═══════════ MAIL ═══════════ */
function loadMail(el) {
  el.innerHTML = '<div class="header"><h1>✉️ 邮件系统</h1><button class="btn btn-primary" onclick="showSendMail()">📨 发送邮件</button></div>' +
    '<div class="card"><h3>📨 发送新邮件</h3>' +

    '<label>内容</label><textarea id="mailContent" placeholder="邮件内容"></textarea>' +
    '<label>收件人 (多个ID用逗号分隔)</label><input id="mailTargets" placeholder="例如: 10001,10002,10003">' +
    '<label>附带金币</label><input id="mailGold" type="number" value="0" style="width:150px">' +
    '<div class="btn-row"><button class="btn btn-primary" onclick="sendMail()">发送</button></div></div>' +

  api('/mail/history').then(function(d) {
    var html = '<div class="card"><h3>📜 邮件发送记录</h3>';
    if (d && d.length > 0) {
      html += '<table><thead><tr><th>ID</th><th>标题</th><th>收件人</th><th>金币</th><th>发送时间</th></tr></thead><tbody>';
      d.forEach(function(m) {
        html += '<tr><td>' + m.id + '</td><td>' + escapeHtml(m.title) + '</td><td>' + escapeHtml(m.playerIds) + '</td><td>' + (m.gold || 0).toLocaleString() + '</td><td style="font-size:11px;color:#888">' + escapeHtml(m.sentAt || '-') + '</td></tr>';
      });
      html += '</tbody></table>';
    } else { html += '<div class="empty">暂无记录</div>'; }
    html += '</div>';
    $('mailHistory').innerHTML = html;
  }).catch(function() { $('mailHistory').innerHTML = '<div class="empty">加载失败</div>'; });
}
function showSendMail() { document.querySelector('.card').scrollIntoView({behavior:'smooth'}); }
function sendMail() {
  var title = $('mailTitle').value.trim();
  var content = $('mailContent').value.trim();
  var targets = $('mailTargets').value.trim();
  var gold = parseInt($('mailGold').value) || 0;
  if (!title || !targets) { toast('请填写标题和收件人', false); return; }
  api('/mail/send', { method: 'POST', body: JSON.stringify({ title: title, content: content, playerIds: targets, gold: gold, itemId: 0, itemCount: 0 }) }).then(function(r) {
    toast(r.msg || '发送成功', r.code === 0);
    if (r.code === 0) { $('mailTitle').value = ''; $('mailContent').value = ''; $('mailTargets').value = ''; $('mailGold').value = '0'; }
  }).catch(function(e) { toast('发送失败: ' + e.message, false); });
}

/* ═══════════ REPORTS ═══════════ */
function loadReports(el) {
  el.innerHTML = '<div class="header"><h1>🚨 举报管理</h1></div><div id="reportList"><div class="empty">加载中...</div></div>';
  api('/reports').then(function(d) {
    var html = '<table><thead><tr><th>ID</th><th>举报者</th><th>被举报者</th><th>类型</th><th>详情</th><th>时间</th><th>状态</th><th>操作</th></tr></thead><tbody>';
    if (d && d.length > 0) {
      d.forEach(function(r) {
        html += '<tr><td>' + r.id + '</td><td>' + escapeHtml(r.reporterName) + '</td><td>' + escapeHtml(r.targetName) + '</td>';
        html += '<td>' + escapeHtml(r.reportTypeName) + '</td><td style="max-width:200px;overflow:hidden;text-overflow:ellipsis">' + escapeHtml(r.detail) + '</td>';
        html += '<td style="font-size:11px;color:#888">' + escapeHtml(r.createdAt) + '</td>';
        html += '<td>' + (r.status === 'pending' ? '<span class="tag tag-warning">待处理</span>' : r.status === 'resolved' ? '<span class="tag tag-success">已处理</span>' : '<span class="tag tag-info">已驳回</span>') + '</td>';
        html += '<td style="white-space:nowrap">';
        if (r.status === 'pending') {
          html += '<button class="btn btn-sm btn-success" onclick="processReport(' + r.id + ','resolve')">通过</button> ';
          html += '<button class="btn btn-sm btn-danger" onclick="processReport(' + r.id + ','dismiss')">驳回</button>';
        } else { html += '<span style="color:#555;font-size:11px">' + escapeHtml(r.processedBy || '-') + '</span>'; }
        html += '</td></tr>';
      });
    } else { html += '<tr><td colspan="8" class="empty">暂无举报</td></tr>'; }
    html += '</tbody></table>';
    $('reportList').innerHTML = html;
  }).catch(function(e) { $('reportList').innerHTML = '<div class="empty">❌ ' + escapeHtml(e.message) + '</div>'; });
}
function processReport(id, action) {
  api('/reports/' + id + '/action', { method: 'POST', body: JSON.stringify({ action: action, reason: action === 'resolve' ? '核实处理' : '证据不足' }) }).then(function(r) {
    toast(r.msg || '操作成功', true);
    loadReports($('main-content'));
  }).catch(function(e) { toast('操作失败: ' + e.message, false); });
}

/* ═══════════ DUNGEON ═══════════ */
function loadDungeon(el) {
  el.innerHTML = '<div class="header"><h1>🏰 副本统计</h1></div><div id="dungeonStats"><div class="empty">加载中...</div></div>';
  api('/dungeon/stats').then(function(d) {
    if (!d.dungeons || d.dungeons.length === 0) { $('dungeonStats').innerHTML = '<div class="empty">暂无数据</div>'; return; }
    var byName = {};
    d.dungeons.forEach(function(s) {
      if (!byName[s.dungeonName]) byName[s.dungeonName] = [];
      byName[s.dungeonName].push(s);
    });
    var html = '';
    Object.keys(byName).forEach(function(name) {
      html += '<div class="card"><h3>🏰 ' + escapeHtml(name) + '</h3>';
      html += '<table><thead><tr><th>难度</th><th>通关次数</th><th>平均时间</th><th>死亡数</th><th>参与人数</th><th>掉率</th></tr></thead><tbody>';
      byName[name].forEach(function(s) {
        html += '<tr><td><span class="tag ' + (s.difficulty === '普通' ? 'tag-success' : s.difficulty === '英雄' ? 'tag-warning' : 'tag-danger') + '">' + escapeHtml(s.difficulty) + '</span></td>';
        html += '<td>' + s.totalClears + '</td><td>' + escapeHtml(s.avgClearTime) + '</td><td>' + s.totalDeaths + '</td><td>' + s.totalPlayers + '</td><td>' + s.dropRate + '</td></tr>';
      });
      html += '</tbody></table></div>';
    });
    $('dungeonStats').innerHTML = html;
  }).catch(function(e) { $('dungeonStats').innerHTML = '<div class="empty">❌ ' + escapeHtml(e.message) + '</div>'; });
}

/* ═══════════ STATS ═══════════ */
function loadStats(el) {
  el.innerHTML = '<div class="header"><h1>📈 数据统计</h1><button class="btn btn-outline" onclick="loadStats($('main-content'))">🔄 刷新</button></div><div id="dailyStats"><div class="empty">加载中...</div></div>';
  api('/stats/daily').then(function(d) {
    var html = '<div class="card"><h3>📊 近7天趋势</h3><div class="chart-bar" id="chart">';
    if (d && d.length > 0) {
      var maxVal = Math.max.apply(null, d.map(function(s) { return Math.max(s.logins || 0, s.trades || 0, s.dungeons || 0); }));
      if (maxVal === 0) maxVal = 1;
      d.forEach(function(s) {
        var h = Math.round(((s.logins || 0) / maxVal) * 100);
        html += '<div class="bar" style="height:' + Math.max(h, 2) + 'px"><div class="val">' + (s.logins || 0) + '</div><div class="label">' + escapeHtml(s.date ? s.date.slice(5) : '') + '</div></div>';
      });
    } else {
      html += '<div class="empty" style="width:100%">暂无统计数据</div>';
    }
    html += '</div></div>';
    html += '<div class="card"><h3>📋 详细数据</h3>';
    if (d && d.length > 0) {
      html += '<table><thead><tr><th>日期</th><th>登录数</th><th>交易数</th><th>副本数</th><th>PVP场次</th></tr></thead><tbody>';
      d.forEach(function(s) {
        html += '<tr><td>' + escapeHtml(s.date) + '</td><td>' + (s.logins || 0) + '</td><td>' + (s.trades || 0) + '</td><td>' + (s.dungeons || 0) + '</td><td>' + (s.pvp || 0) + '</td></tr>';
      });
      html += '</tbody></table>';
    } else { html += '<div class="empty">暂无数据</div>'; }
    html += '</div>';
    $('dailyStats').innerHTML = html;
  }).catch(function() {
    $('dailyStats').innerHTML = '<div class="empty">暂无统计数据</div>';
  });
}
