<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>指尖江湖2 - 管理后台</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0a0a14;color:#c8c8d4;min-height:100vh;overflow-x:hidden}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:#0a0a14}::-webkit-scrollbar-thumb{background:#2a2a3e;border-radius:3px}a{color:#b088ff;text-decoration:none}
.app{display:flex;min-height:100vh}
.sidebar{width:220px;background:#0f0f1e;padding:0;border-right:1px solid #1a1a2e;position:fixed;height:100vh;overflow-y:auto;z-index:10}
.sidebar .logo{padding:18px 20px;border-bottom:1px solid #1a1a2e}.sidebar .logo h1{font-size:18px;color:#b088ff;font-weight:700}.sidebar .logo p{font-size:10px;color:#555;margin-top:2px}
.sidebar .nav-group{margin:4px 0}.sidebar .nav-group .group-title{display:flex;align-items:center;gap:8px;padding:10px 20px;color:#555;font-size:11px;text-transform:uppercase;letter-spacing:.5px;cursor:pointer}
.sidebar .nav-group .group-title:hover{color:#888}.sidebar .nav-group .group-title .arrow{font-size:8px;transition:transform .2s}.sidebar .nav-group .group-title .arrow.open{transform:rotate(90deg)}
.sidebar .nav-group .sub-items{display:none}.sidebar .nav-group .sub-items.open{display:block}
.sidebar a{display:flex;align-items:center;gap:10px;padding:9px 20px 9px 28px;color:#777;text-decoration:none;font-size:13px;border-left:3px solid transparent}
.sidebar a:hover,.sidebar a.active{color:#b088ff;background:rgba(176,136,255,.06);border-left-color:#b088ff}.sidebar a .icon{width:20px;text-align:center;font-size:14px}
.top-level-link{padding:11px 20px!important;border-left-color:transparent!important}
.main{margin-left:220px;flex:1;padding:20px 28px;min-width:0}
.main .header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;padding-bottom:12px;border-bottom:1px solid #1a1a2e}
.main .header h2{font-size:18px;color:#e8e8f0;font-weight:600}.main .header .server-time{font-size:11px;color:#555;font-family:monospace}
.page{display:none}.page.active{display:block}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:20px}
.card{background:#12121e;border-radius:8px;padding:14px 16px;border:1px solid #1e1e30;position:relative;overflow:hidden}
.card:hover{border-color:#2a2a44}.card .label{font-size:10px;color:#666;margin-bottom:4px}.card .value{font-size:22px;font-weight:700;color:#f0f0ff}.card .sub{font-size:10px;color:#555;margin-top:2px}
.card .icon-bg{position:absolute;right:12px;top:50%;transform:translateY(-50%);font-size:32px;opacity:.06;color:#b088ff}
.table-wrap{background:#12121e;border-radius:8px;border:1px solid #1e1e30;overflow:hidden;margin-bottom:16px;width:100%}
.table-wrap .title{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;border-bottom:1px solid #1e1e30;background:#0f0f1c}
.table-wrap .title h3{font-size:13px;color:#d0d0e0;font-weight:500}
table{width:100%;border-collapse:collapse;table-layout:auto}
th,td{padding:8px 10px;text-align:left;border-bottom:1px solid #18182a;font-size:12px;white-space:nowrap}
th{color:#666;font-weight:600;font-size:10px;text-transform:uppercase;letter-spacing:.4px;background:#0c0c18;position:sticky;top:0}
td{color:#c0c0d0}tr:nth-child(even){background:rgba(255,255,255,.015)}tr:hover{background:rgba(176,136,255,.04)}
.table-scroll{overflow-x:auto;max-height:600px}
.form-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px;align-items:end}
.form-group{margin-bottom:10px;flex:1;min-width:140px}.form-group label{display:block;font-size:11px;color:#666;margin-bottom:3px}
input,textarea,select{width:100%;padding:7px 10px;border:1px solid #22223a;border-radius:5px;background:#0f0f1e;color:#c8c8d4;font-size:12px;outline:none}
input:focus,textarea:focus,select:focus{border-color:#b088ff}textarea{resize:vertical;min-height:50px}
button{padding:7px 14px;border:none;border-radius:5px;cursor:pointer;font-size:12px;font-weight:500}
button:active{transform:scale(.97)}
.btn-primary{background:#b088ff;color:#fff}.btn-primary:hover{background:#9a6fef;box-shadow:0 3px 12px rgba(176,136,255,.2)}
.btn-danger{background:#e74c5e;color:#fff}.btn-danger:hover{background:#d43c4e;box-shadow:0 3px 12px rgba(231,76,94,.2)}
.btn-success{background:#2ecc71;color:#fff}.btn-success:hover{background:#27ae60;box-shadow:0 3px 12px rgba(46,204,113,.2)}
.btn-warning{background:#f39c12;color:#fff}.btn-warning:hover{background:#e67e22;box-shadow:0 3px 12px rgba(243,156,18,.2)}
.btn-sm{padding:4px 10px;font-size:11px}
.btn-outline{background:transparent;border:1px solid #333;color:#999}.btn-outline:hover{border-color:#b088ff;color:#b088ff}
.badge{display:inline-block;padding:2px 6px;border-radius:3px;font-size:10px;font-weight:600}
.badge-green{background:rgba(46,204,113,.12);color:#2ecc71}.badge-red{background:rgba(231,76,94,.12);color:#e74c5e}
.badge-yellow{background:rgba(241,196,15,.12);color:#f1c40f}.badge-blue{background:rgba(52,152,219,.12);color:#3498db}.badge-gray{background:rgba(150,150,150,.12);color:#999}
.pagination{display:flex;justify-content:center;align-items:center;gap:6px;padding:10px 0}.pagination button{padding:4px 10px;font-size:11px;min-width:30px}.pagination .page-info{font-size:11px;color:#555}
.modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.6);z-index:1000;align-items:center;justify-content:center}
.modal-overlay.show{display:flex}.modal{background:#14142a;border-radius:10px;border:1px solid #2a2a44;padding:0;min-width:360px;max-width:500px;width:90%;max-height:80vh;overflow-y:auto}
.modal .modal-header{padding:14px 18px;border-bottom:1px solid #1e1e30;display:flex;justify-content:space-between;align-items:center}
.modal .modal-header h3{font-size:15px;color:#e0e0f0}.modal .modal-header .close{font-size:20px;color:#555;cursor:pointer}
.modal .modal-header .close:hover{color:#b088ff}.modal .modal-body{padding:16px 18px}
.modal .modal-footer{padding:12px 18px;border-top:1px solid #1e1e30;display:flex;gap:8px;justify-content:flex-end}
.toast-container{position:fixed;top:16px;right:16px;z-index:2000;display:flex;flex-direction:column;gap:8px}
.toast{padding:10px 16px;border-radius:6px;font-size:13px;color:#fff;animation:slideIn .3s ease;max-width:320px;box-shadow:0 4px 16px rgba(0,0,0,.3)}
.toast.success{background:#2ecc71}.toast.error{background:#e74c5e}.toast.info{background:#3498db}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}@keyframes spin{to{transform:rotate(360deg)}}
.loading{display:flex;align-items:center;justify-content:center;padding:30px;color:#555;gap:8px}
.loading .spinner{width:20px;height:20px;border:2px solid #333;border-top-color:#b088ff;border-radius:50%;animation:spin .6s linear infinite}
.tabs{display:flex;gap:4px;margin-bottom:14px;border-bottom:1px solid #1e1e30;padding-bottom:0}
.tab{padding:8px 16px;font-size:12px;color:#666;cursor:pointer;border-bottom:2px solid transparent}
.tab:hover{color:#b088ff}.tab.active{color:#b088ff;border-bottom-color:#b088ff}
.chart-wrap{background:#12121e;border-radius:8px;border:1px solid #1e1e30;padding:14px;margin-bottom:14px}
.chart-wrap canvas{width:100%!important;height:280px!important}
.monitor-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px}
.monitor-item{background:#12121e;border-radius:8px;border:1px solid #1e1e30;padding:14px 16px;text-align:center}
.monitor-item .m-value{font-size:28px;font-weight:700;color:#f0f0ff}.monitor-item .m-label{font-size:11px;color:#666;margin-top:4px}.monitor-item .m-sub{font-size:10px;color:#555;margin-top:2px}
.action-btns{display:flex;gap:6px;flex-wrap:wrap}.action-btns button{font-size:11px;padding:4px 10px}
</style></head>
<body><div class="app"><div class="sidebar">
<div class="logo"><h1>指尖江湖2</h1><p>管理后台 v0.9.1</p></div>
<div class="nav-group"><a href="#" class="top-level-link active" onclick="switchPage('dashboard')"><span class="icon">📊</span>总览面板</a></div>
<div class="nav-group"><div class="group-title" onclick="toggleGroup(this)"><span class="arrow">▶</span> 👥 玩家管理</div><div class="sub-items open">
<a href="#" onclick="switchPage('users')"><span class="icon">👥</span>玩家列表</a>
<a href="#" onclick="switchPage('user-detail')"><span class="icon">🔍</span>玩家详情</a></div></div>
<div class="nav-group"><a href="#" class="top-level-link" onclick="switchPage('logs')"><span class="icon">📝</span>操作日志</a></div>
<div class="nav-group"><a href="#" class="top-level-link" onclick="switchPage('trade')"><span class="icon">🏪</span>交易管理</a></div>
<div class="nav-group"><div class="group-title" onclick="toggleGroup(this)"><span class="arrow">▶</span> 🎮 运营管理</div><div class="sub-items">
<a href="#" onclick="switchPage('items')"><span class="icon">📦</span>物品发放</a>
<a href="#" onclick="switchPage('currency')"><span class="icon">💰</span>货币操作</a>
<a href="#" onclick="switchPage('mail')"><span class="icon">📧</span>邮件系统</a></div></div>
<div class="nav-group"><a href="#" class="top-level-link" onclick="switchPage('reports')"><span class="icon">📋</span>举报管理</a></div>
<div class="nav-group"><a href="#" class="top-level-link" onclick="switchPage('server')"><span class="icon">⚙️</span>服务器监控</a></div>
<div class="nav-group"><a href="#" class="top-level-link" onclick="switchPage('stats')"><span class="icon">📈</span>每日统计</a></div>
<div class="nav-group"><div class="group-title" onclick="toggleGroup(this)"><span class="arrow">▶</span> 🛠️ 系统管理</div><div class="sub-items">
<a href="#" onclick="switchPage('announcements')"><span class="icon">📢</span>公告管理</a>
<a href="#" onclick="switchPage('maintenance')"><span class="icon">🗄️</span>数据管理</a></div></div>
</div>
<div class="main">
<div class="header"><h2 id="pageTitle">总览面板</h2><div class="server-time" id="serverTime"></div></div>
<div class="page active" id="page-dashboard"></div><div class="page" id="page-users"></div><div class="page" id="page-user-detail"></div>
<div class="page" id="page-logs"></div><div class="page" id="page-trade"></div><div class="page" id="page-items"></div>
<div class="page" id="page-currency"></div><div class="page" id="page-mail"></div><div class="page" id="page-reports"></div>
<div class="page" id="page-server"></div><div class="page" id="page-stats"></div>
<div class="page" id="page-announcements"></div><div class="page" id="page-maintenance"></div>
</div></div>
<div class="toast-container" id="toastContainer"></div>
<div class="modal-overlay" id="modalOverlay"><div class="modal"><div class="modal-header"><h3 id="modalTitle">标题</h3><span class="close" onclick="closeModal()">✕</span></div><div class="modal-body" id="modalBody"></div><div class="modal-footer" id="modalFooter"></div></div></div>
<script>
let currentPage='dashboard';
function toast(m,t){const c=document.getElementById('toastContainer');const d=document.createElement('div');d.className='toast '+(t||'success');d.textContent=m;c.appendChild(d);setTimeout(()=>d.remove(),3000)}
function showModal(t,b,f){document.getElementById('modalTitle').textContent=t;document.getElementById('modalBody').innerHTML=b;document.getElementById('modalFooter').innerHTML=f||'';document.getElementById('modalOverlay').classList.add('show')}
function closeModal(){document.getElementById('modalOverlay').classList.remove('show')}
document.getElementById('modalOverlay').onclick=function(e){if(e.target===this)closeModal()}
function toggleGroup(el){const a=el.querySelector('.arrow');const s=el.nextElementSibling;a.classList.toggle('open');s.classList.toggle('open')}
function esc(s){const d=document.createElement('div');d.textContent=s||'';return d.innerHTML}
async function api(url,o){try{const r=await fetch(url,{headers:{'Content-Type':'application/json'},...o});return await r.json()}catch(e){toast('请求失败','error');return null}}
function sb(s){if(s==='online'||s==='resolved'||s==='success')return '<span class="badge badge-green">在线</span>';if(s==='offline')return '<span class="badge badge-gray">离线</span>';if(s==='banned'||s==='error')return '<span class="badge badge-red">封禁</span>';if(s==='pending')return '<span class="badge badge-yellow">待处理</span>';if(s==='warned')return '<span class="badge badge-yellow">已警告</span>';if(s==='dismissed')return '<span class="badge badge-gray">已驳回</span>';return s}
function qb(q){const m={1:'#555',2:'#2ecc71',3:'#3498db',4:'#9b59b6',5:'#e74c5e'};const n={1:'普通',2:'优秀',3:'精良',4:'史诗',5:'传说'};return '<span class="badge" style="background:'+(m[q]||'#555')+'22;color:'+(m[q]||'#555')+'">'+(n[q]||q)+'</span>'}
function pg(t,p,ps,fn){const pc=Math.ceil(t/ps);let h='<div class="pagination"><button class="btn-outline btn-sm" onclick="'+fn+'('+(p-1)+')" '+(p<=1?'disabled':'')+'>&lsaquo;</button>';for(let i=Math.max(1,p-2);i<=Math.min(pc,p+2);i++)h+='<button class="'+(i===p?'btn-primary':'btn-outline')+' btn-sm" onclick="'+fn+'('+i+')">'+i+'</button>';h+='<button class="btn-outline btn-sm" onclick="'+fn+'('+(p+1)+')" '+(p>=pc?'disabled':'')+'>&rsaquo;</button><span class="page-info">共'+t+'/'+pc+'页</span></div>';return h}

function switchPage(name){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.sidebar a').forEach(a=>a.classList.remove('active'));
  const page=document.getElementById('page-'+name);if(page)page.classList.add('active');
  document.querySelectorAll('.sidebar a').forEach(a=>{if(a.getAttribute('onclick')&&a.getAttribute('onclick').includes(name))a.classList.add('active')});
  currentPage=name;
  const t={'dashboard':'📊 总览面板','users':'👥 玩家列表','user-detail':'🔍 玩家详情','logs':'📝 操作日志','trade':'🏪 交易管理','items':'📦 物品发放','currency':'💰 货币操作','mail':'📧 邮件系统','reports':'📋 举报管理','server':'⚙️ 服务器监控','stats':'📈 每日统计','announcements':'📢 公告管理','maintenance':'🗄️ 数据管理'};
  document.getElementById('pageTitle').textContent=t[name]||name;
  const f={'dashboard':loadDashboard,'users':()=>loadUsers(1),'logs':()=>loadLogs(1),'trade':()=>loadTrade(1),'announcements':loadAnnouncements,'server':loadServerStats,'stats':loadStats,'items':()=>{renderItems();loadItemLogs()},'currency':()=>{renderCurrency();loadCurrencyLogs()},'mail':()=>{renderMail();loadMailHistory()},'reports':()=>loadReports(1),'maintenance':loadMaintenance,'user-detail':()=>loadUserDetail(0)};
  if(f[name])f[name]();
  if(name==='server')setInterval(()=>{if(currentPage==='server')loadServerStats()},5000);
}

async function loadDashboard(){
  const d=await api('/api/dashboard');if(!d)return;
  document.getElementById('serverTime').textContent=d.serverTime+' | 运行 '+d.uptime;
  document.getElementById('page-dashboard').innerHTML='<div class="cards"><div class="card"><div class="label">在线玩家</div><div class="value">'+d.onlinePlayers+'</div><div class="sub">/'+d.totalUsers+'总用户</div></div><div class="card"><div class="label">今日登录</div><div class="value">'+(d.todayLogins||0)+'</div></div><div class="card"><div class="label">今日聊天</div><div class="value">'+(d.todayChats||0)+'</div></div><div class="card"><div class="label">今日交易</div><div class="value">'+(d.todayTrades||0)+'</div></div><div class="card"><div class="label">今日副本</div><div class="value">'+(d.todayDungeons||0)+'</div></div><div class="card"><div class="label">今日PVP</div><div class="value">'+(d.todayPvp||0)+'</div></div><div class="card"><div class="label">封禁数</div><div class="value">'+d.bannedCount+'</div></div><div class="card"><div class="label">服务器</div><div class="value" style="color:#2ecc71;font-size:16px">● 运行中</div></div></div><div class="table-wrap"><div class="title"><h3>最近操作</h3></div><div class="table-scroll" id="recentLogs"><div class="loading">加载中...</div></div></div>';
  const l=await api('/api/logs');if(!l)return;
  let h='<table><tr><th>ID</th><th>玩家</th><th>类型</th><th>详情</th><th>时间</th></tr>';
  l.items.forEach(x=>{h+='<tr><td>'+x.id+'</td><td>'+esc(x.playerName)+'</td><td>'+esc(x.actionType)+'</td><td>'+esc((x.detail||'').substring(0,50))+'</td><td>'+x.timestamp+'</td></tr>'});
  h+='</table>';document.getElementById('recentLogs').innerHTML=h;
}

async function loadUsers(p){
  const s=document.getElementById('us')?.value||'';const st=document.getElementById('ust')?.value||'';
  const lm=document.getElementById('ulm')?.value||0;const lx=document.getElementById('ulx')?.value||0;
  const d=await api('/api/users?page='+(p||1)+'&search='+encodeURIComponent(s)+'&status='+st+'&vip=0&levelMin='+lm+'&levelMax='+lx);if(!d)return;
  let h='<div class="table-wrap"><div class="title"><h3>玩家列表</h3></div><div style="padding:10px"><div class="form-row"><div class="form-group"><input id="us" placeholder="搜索..." onkeyup="loadUsers(1)"></div><div class="form-group"><select id="ust" onchange="loadUsers(1)"><option value="">全部</option><option value="online">在线</option><option value="banned">封禁</option></select></div><div class="form-group"><input id="ulm" type="number" placeholder="最低等级" style="max-width:80px" onchange="loadUsers(1)"></div><div class="form-group"><input id="ulx" type="number" placeholder="最高等级" style="max-width:80px" onchange="loadUsers(1)"></div><button class="btn-primary" onclick="loadUsers(1)">搜索</button></div></div><div class="table-scroll"><table><tr><th>ID</th><th>名称</th><th>等级</th><th>金币</th><th>钻石</th><th>VIP</th><th>状态</th><th>操作</th></tr>';
  d.items.forEach(u=>{h+='<tr><td>'+u.playerId+'</td><td>'+esc(u.playerName)+'</td><td>'+u.level+'</td><td>'+u.gold+'</td><td>'+u.gem+'</td><td>'+(u.vip?'VIP':'')+'</td><td>'+(u.isBanned?'<span class="badge badge-red">封禁</span>':'<span class="badge badge-green">正常</span>')+'</td><td class="action-btns"><button class="btn-sm btn-outline" onclick="viewUser('+u.playerId+')">查看</button>'+(u.isBanned?'<button class="btn-sm btn-success" onclick="unbanUser('+u.playerId+')">解封</button>':'<button class="btn-sm btn-danger" onclick="banUser('+u.playerId+',''+esc(u.playerName)+'')">封禁</button>')+'</td></tr>'});
  h+='</table></div></div>'+pg(d.total,p||1,20,'loadUsers');
  document.getElementById('page-users').innerHTML=h;
}

function viewUser(id){switchPage('user-detail');loadUserDetail(id)}
async function loadUserDetail(id){
  if(!id){document.getElementById('page-user-detail').innerHTML='<div class="loading">输入玩家ID</div><div style="text-align:center;padding:20px"><input id="udPid" type="number" placeholder="输入玩家ID..." style="width:200px;display:inline-block"> <button class="btn-primary" onclick="viewUser(+document.getElementById('udPid').value)">查询</button></div>';return}
  const u=await api('/api/users/'+id);if(!u)return;
  document.getElementById('page-user-detail').innerHTML='<div class="cards"><div class="card"><div class="label">'+esc(u.playerName)+'</div><div class="value" style="font-size:18px">ID:'+u.playerId+' Lv.'+u.level+'</div></div><div class="card"><div style="display:flex;gap:16px;flex-wrap:wrap"><div><div class="label">金币</div><div style="font-size:18px;color:#f0f0ff">'+u.gold+'</div></div><div><div class="label">钻石</div><div style="font-size:18px;color:#f0f0ff">'+u.gem+'</div></div><div><div class="label">状态</div><div>'+(u.isBanned?'<span class="badge badge-red">封禁</span>':'<span class="badge badge-green">正常</span>')+'</div></div></div></div></div><div class="action-btns" style="margin-bottom:14px"><button class="btn-sm btn-primary" onclick="showSendMailForm('+id+')">📧 邮件</button><button class="btn-sm btn-success" onclick="showGrantItemForm('+id+')">📦 物品</button><button class="btn-sm btn-warning" onclick="showCurrencyForm('+id+')">💰 货币</button>'+(u.isBanned?'<button class="btn-sm btn-success" onclick="unbanUser('+id+')">解封</button>':'<button class="btn-sm btn-danger" onclick="banUser('+id+',''+esc(u.playerName)+'')">封禁</button>')+'</div><div class="table-wrap"><div class="title"><h3>操作记录</h3></div><div class="table-scroll" id="udLogs"><div class="loading">加载中...</div></div></div>';
  const logs=await api('/api/logs/player/'+id);if(!logs)return;
  let h='<table><tr><th>类型</th><th>详情</th><th>时间</th></tr>';logs.items.forEach(l=>{h+='<tr><td>'+esc(l.actionType)+'</td><td>'+esc(l.detail)+'</td><td>'+l.timestamp+'</td></tr>'});h+='</table>';document.getElementById('udLogs').innerHTML=h;
}

async function loadLogs(p){
  const pid=document.getElementById('lp')?.value||'';const tp=document.getElementById('lt')?.value||'';
  const d=await api('/api/logs?page='+(p||1)+'&playerId='+pid+'&actionType='+tp);if(!d)return;
  const ts=await api('/api/logs/types');

async function loadReports(p){const d=await api('/api/reports');if(!d)return;let h='<div class="table-wrap"><div class="title"><h3>举报管理</h3></div><div class="table-scroll"><table><tr><th>举报人</th><th>目标</th><th>类型</th><th>状态</th><th>操作</th></tr>';d.items.forEach(r=>{h+='<tr><td>'+esc(r.reporterName)+'</td><td>'+esc(r.targetName)+'</td><td>'+esc(r.reportTypeName||r.reportType)+'</td><td>'+sb(r.status)+'</td><td>'+(r.status==='pending'?'<button class="btn-sm btn-warning" onclick="processR('+r.id+',''+"'warn'"+')'">警告</button> <button class="btn-sm btn-danger" onclick="processR('+r.id+',''+"'ban'"+')'">封禁</button> <button class="btn-sm btn-outline" onclick="processR('+r.id+',''+"'dismiss'"+')'">驳回</button>':'已处理')+'</td></tr>'});h+='</table></div></div>';document.getElementById('page-reports').innerHTML=h}

async function loadStats(){const d=await api('/api/stats/daily');if(!d)return;document.getElementById('page-stats').innerHTML='<div class="chart-wrap"><canvas id="statsCanvas"></canvas></div>';window._d=d;drawChart('dau')}
function drawChart(k){const d=window._d;if(!d)return;const c=document.getElementById('statsCanvas');if(!c)return;const ctx=c.getContext('2d');c.width=c.parentElement.clientWidth*2;c.height=400;ctx.clearRect(0,0,c.width,c.height);
const v=d[k];const l=d.days;const mx=Math.max(...v)*1.2;const w=c.width,h=c.height,pad=50,gw=w-pad*2,gh=h-pad*2,bw=gw/(l.length-1);
ctx.strokeStyle='#1e1e30';ctx.lineWidth=1;for(let i=0;i<=4;i++){const y=pad+gh*(1-i/4);ctx.beginPath();ctx.moveTo(pad,y);ctx.lineTo(w-pad,y);ctx.stroke();ctx.fillStyle='#555';ctx.font='11px sans-serif';ctx.textAlign='right';ctx.fillText(Math.round(mx*i/4),pad-8,y+4)}
ctx.fillStyle='#555';ctx.font='11px sans-serif';ctx.textAlign='center';l.forEach((x,i)=>ctx.fillText(x,pad+bw*i,h-pad+18));
ctx.beginPath();ctx.moveTo(pad,pad+gh);v.forEach((x,i)=>ctx.lineTo(pad+bw*i,pad+gh*(1-x/mx)));ctx.lineTo(pad+bw*(l.length-1),pad+gh);ctx.closePath();const g=ctx.createLinearGradient(0,pad,0,pad+gh);g.addColorStop(0,'rgba(176,136,255,.3)');g.addColorStop(1,'rgba(176,136,255,.02)');ctx.fillStyle=g;ctx.fill();
ctx.beginPath();ctx.strokeStyle='#b088ff';ctx.lineWidth=2.5;ctx.lineJoin='round';v.forEach((x,i)=>{const xp=pad+bw*i,yp=pad+gh*(1-x/mx);i===0?ctx.moveTo(xp,yp):ctx.lineTo(xp,yp)});ctx.stroke();
v.forEach((x,i)=>{const xp=pad+bw*i,yp=pad+gh*(1-x/mx);ctx.beginPath();ctx.arc(xp,yp,4,0,Math.PI*2);ctx.fillStyle='#b088ff';ctx.fill();ctx.beginPath();ctx.arc(xp,yp,2,0,Math.PI*2);ctx.fillStyle='#0a0a14';ctx.fill();ctx.fillStyle='#f0f0ff';ctx.font='bold 12px sans-serif';ctx.textAlign='center';ctx.fillText(x,xp,yp-12)})}
async function loadAnnouncements(){const d=await api('/api/announcements');if(!d)return;let h='<div class="cards"><div class="card"><div class="label">创建公告</div><div class="form-group"><input id="aT" placeholder="标题"></div><div class="form-group"><textarea id="aC" placeholder="内容"></textarea></div><button class="btn-primary" onclick="createAnn()">发布</button></div></div><div class="table-wrap"><div class="title"><h3>公告列表</h3></div><div class="table-scroll"><table><tr><th>标题</th><th>内容</th><th>时间</th><th>操作</th></tr>';d.forEach(a=>{h+='<tr><td>'+esc(a.title)+'</td><td>'+esc(a.content)+'</td><td>'+new Date(a.createdAt).toLocaleString()+'</td><td><button class="btn-sm btn-danger" onclick="delAnn('+a.id+')">删除</button></td></tr>'});h+='</table></div></div>';document.getElementById('page-announcements').innerHTML=h}
