<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>指尖江湖2 - 管理后台</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0f0f1a;color:#e0e0e0;min-height:100vh}input,select,textarea{padding:8px 12px;border:1px solid #333;border-radius:6px;background:#1a1a2e;color:#e0e0e0;font-size:14px;outline:none;transition:border-color .2s}input:focus,select:focus,textarea:focus{border-color:#6c63ff}button{padding:8px 20px;border:none;border-radius:6px;cursor:pointer;font-size:14px;transition:all .2s}button:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(108,99,255,.3)}table{width:100%;border-collapse:collapse}th,td{padding:10px 14px;text-align:left;border-bottom:1px solid #2a2a3e}th{color:#888;font-weight:600;font-size:12px;text-transform:uppercase;letter-spacing:.5px}td{font-size:14px}tr:hover{background:#1a1a2e}/* Layout */.app{display:flex;min-height:100vh}.sidebar{width:220px;background:#1a1a2e;padding:20px 0;border-right:1px solid #2a2a3e;position:fixed;height:100vh;overflow-y:auto}.sidebar .logo{padding:0 20px 24px;border-bottom:1px solid #2a2a3e;margin-bottom:8px}.sidebar .logo h1{font-size:20px;color:#6c63ff;font-weight:700}.sidebar .logo p{font-size:12px;color:#666;margin-top:4px}.sidebar a{display:block;padding:10px 20px;color:#999;text-decoration:none;font-size:14px;transition:all .2s;cursor:pointer}.sidebar a:hover,.sidebar a.active{color:#6c63ff;background:rgba(108,99,255,.08)}.sidebar a .icon{margin-right:8px;width:20px;display:inline-block;text-align:center}.main{margin-left:220px;flex:1;padding:24px 32px}.main .header{display:flex;justify-content:space-between;align-items:center;margin-bottom:28px;padding-bottom:16px;border-bottom:1px solid #2a2a3e}.main .header h2{font-size:22px;color:#fff}.main .header .user-info{font-size:13px;color:#888}.main .header .user-info span{color:#6c63ff;font-weight:600}.page{display:none}.page.active{display:block}/* Cards */.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:28px}.card{background:#1a1a2e;border-radius:10px;padding:20px;border:1px solid #2a2a3e;position:relative;overflow:hidden}.card .label{font-size:12px;color:#888;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}.card .value{font-size:28px;font-weight:700;color:#fff}.card .sub{font-size:12px;color:#666;margin-top:4px}.card .icon-bg{position:absolute;right:16px;top:50%;transform:translateY(-50%);font-size:48px;opacity:.08;color:#6c63ff}/* Tables */.table-wrap{background:#1a1a2e;border-radius:10px;border:1px solid #2a2a3e;overflow:hidden;margin-bottom:20px}.table-wrap .title{display:flex;justify-content:space-between;align-items:center;padding:14px 18px;border-bottom:1px solid #2a2a3e}.table-wrap .title h3{font-size:15px;color:#fff}.table-wrap .title .action{font-size:13px;color:#6c63ff;cursor:pointer}/* Forms */.form-group{margin-bottom:16px}.form-group label{display:block;font-size:13px;color:#888;margin-bottom:6px}.form-group input,.form-group textarea,.form-group select{width:100%;max-width:400px}.form-group textarea{resize:vertical;min-height:80px}.row{display:flex;gap:20px;flex-wrap:wrap}.col{flex:1;min-width:300px}/* Login */.login-overlay{position:fixed;inset:0;background:#0f0f1a;display:flex;align-items:center;justify-content:center;z-index:1000}.login-box{background:#1a1a2e;border-radius:12px;padding:40px;width:360px;border:1px solid #2a2a3e}.login-box h2{color:#fff;margin-bottom:24px;text-align:center}.login-box .form-group input{width:100%;max-width:none}.login-box button{width:100%;background:#6c63ff;color:#fff;padding:12px;font-size:15px;font-weight:600;margin-top:8px}.login-box .error{color:#ff4757;font-size:13px;margin-top:8px;display:none;text-align:center}/* Badges */.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600}.badge-green{background:rgba(0,200,83,.15);color:#00c853}.badge-red{background:rgba(255,71,87,.15);color:#ff4757}.badge-yellow{background:rgba(255,193,7,.15);color:#ffc107}.badge-blue{background:rgba(33,150,243,.15);color:#2196f3}/* Status */.status-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:6px}.status-dot.green{background:#00c853}.status-dot.red{background:#ff4757}.status-dot.yellow{background:#ffc107}/* Log viewer */.log-viewer{background:#0a0a12;border-radius:8px;padding:16px;font-family:monospace;font-size:13px;max-height:400px;overflow-y:auto;white-space:pre-wrap;word-break:break-all}.log-viewer .line{padding:2px 0;color:#888}.log-viewer .line .time{color:#666;margin-right:8px}.log-viewer .line .lvl-info{color:#2196f3}.log-viewer .line .lvl-warn{color:#ffc107}.log-viewer .line .lvl-error{color:#ff4757}.btn-primary{background:#6c63ff;color:#fff}.btn-danger{background:#ff4757;color:#fff}.btn-secondary{background:#2a2a3e;color:#e0e0e0}.toast{position:fixed;top:20px;right:20px;padding:12px 24px;border-radius:8px;color:#fff;font-size:14px;z-index:2000;animation:slideIn .3s;box-shadow:0 4px 20px rgba(0,0,0,.4)}.toast.success{background:#00c853}.toast.error{background:#ff4757}.toast.info{background:#2196f3}@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}.loading{text-align:center;padding:40px;color:#666}.loading:after{content:".";animation:dots 1.5s steps(5,end) infinite}@keyframes dots{0%,20%{content:"."}40%{content:".."}60%{content:"..."}80%,100%{content:"...."}}@media(max-width:768px){.sidebar{width:60px}.sidebar a span{display:none}.sidebar .logo h1{font-size:0}.sidebar .logo h1:after{content:"JX3";font-size:16px}.main{margin-left:60px;padding:16px}}</style></head><body><div class="login-overlay" id="loginOverlay"><div class="login-box"><h2>指尖江湖2 管理后台</h2><div class="form-group"><label>用户名</label><input type="text" id="loginUser" placeholder="admin"></div><div class="form-group"><label>密码</label><input type="password" id="loginPass" placeholder="admin123"></div><button onclick="doLogin()">登录</button><div class="error" id="loginError">账号或密码错误</div></div></div><div class="app" id="app" style="display:none"><div class="sidebar"><div class="logo"><h1>指尖江湖2</h1><p>Management Panel</p></div><a class="active" onclick="showPage('dashboard',this)"><span class="icon">📊</span><span>仪表盘</span></a><a onclick="showPage('players',this)"><span class="icon">👥</span><span>玩家管理</span></a><a onclick="showPage('server',this)"><span class="icon">⚙️</span><span>服务器管理</span></a><a onclick="showPage('giftcodes',this)"><span class="icon">🎁</span><span>礼包码</span></a><a onclick="showPage('logs',this)"><span class="icon">📋</span><span>系统日志</span></a><a onclick="showPage('accounts',this)"><span class="icon">🔐</span><span>账号管理</span></a><a onclick="logout()" style="position:absolute;bottom:20px;color:#ff4757"><span class="icon">🚪</span><span>退出登录</span></a></div><div class="main"><div class="header"><h2 id="pageTitle">仪表盘</h2><div class="user-info">欢迎回来，<span id="userDisplay">admin</span></div></div><!-- Dashboard --><div class="page active" id="page-dashboard"><div class="cards" id="dashCards"><div class="loading">加载中</div></div><div class="row"><div class="col"><div class="table-wrap"><div class="title"><h3>系统信息</h3></div><table id="serverInfoTable"><tr><td>加载中...</td></tr></table></div></div><div class="col"><div class="table-wrap"><div class="title"><h3>快速操作</h3></div><div style="padding:16px"><button class="btn-primary" onclick="showPage('server',document.querySelector('.sidebar a:nth-child(4)'))" style="margin-right:10px">📢 发送公告</button><button class="btn-secondary" style="margin-right:10px" onclick="showPage('players',document.querySelector('.sidebar a:nth-child(3)'))">🔍 搜索玩家</button><button class="btn-secondary" onclick="location.reload()">🔄 刷新仪表盘</button></div></div></div></div></div><!-- Players --><div class="page" id="page-players"><div class="row"><div class="col"><div class="form-group"><label>搜索玩家</label><div style="display:flex;gap:8px"><input type="text" id="playerSearch" placeholder="输入玩家名..." onkeyup="if(event.key=='Enter')searchPlayer()" style="flex:1;max-width:400px"><button class="btn-primary" onclick="searchPlayer()">搜索</button></div></div></div></div><div class="table-wrap"><div class="title"><h3>搜索结果</h3><span class="action" id="searchCount">0 条</span></div><table><thead><tr><th>ID</th><th>名称</th><th>等级</th><th>最后登录</th><th>操作</th></tr></thead><tbody id="playerResults"><tr><td colspan="5" style="text-align:center;color:#666;padding:30px">输入玩家名搜索</td></tr></tbody></table></div><div class="table-wrap" id="playerDetail" style="display:none"><div class="title"><h3>玩家详情</h3><span class="action" onclick="document.getElementById('playerDetail').style.display='none'">关闭</span></div><div id="playerDetailContent"></div></div></div><!-- Server --><div class="page" id="page-server"><div class="row"><div class="col"><div class="table-wrap"><div class="title"><h3>📢 发送公告</h3></div><div style="padding:16px"><div class="form-group"><label>标题</label><input type="text" id="noticeTitle" placeholder="公告标题"></div><div class="form-group"><label>内容</label><textarea id="noticeContent" placeholder="公告内容..."></textarea></div><div class="form-group"><label>类型</label><select id="noticeType"><option value="1">系统公告</option><option value="2">活动公告</option><option value="3">维护公告</option></select></div><button class="btn-primary" onclick="sendNotice()">发送公告</button></div></div></div><div class="col"><div class="table-wrap"><div class="title"><h3>⚙️ 服务器配置</h3></div><div style="padding:16px" id="serverConfig">加载中...</div></div></div></div></div><!-- Gift Codes --><div class="page" id="page-giftcodes"><div class="row"><div class="col"><div class="table-wrap"><div class="title"><h3>🎁 创建礼包码</h3></div><div style="padding:16px"><div class="form-group"><label>礼包码</label><input type="text" id="gcCode" placeholder="VIP888"></div><div class="form-group"><label>物品 (JSON格式)</label><input type="text" id="gcItems" placeholder='[{"id":1001,"count":10}]'></div><div class="form-group"><label>使用次数上限</label><input type="number" id="gcLimit" value="100"></div><button class="btn-primary" onclick="createGiftCode()">创建礼包码</button></div></div></div><div class="col"><div class="table-wrap"><div class="title"><h3>礼包码列表</h3></div><table><thead><tr><th>ID</th><th>码</th><th>物品</th><th>使用/上限</th><th>状态</th><th>创建时间</th></tr></thead><tbody id="gcList"><tr><td colspan="6" style="text-align:center;color:#666;padding:20px">加载中...</td></tr></tbody></table></div></div></div></div><!-- Logs --><div class="page" id="page-logs"><div class="table-wrap"><div class="title"><h3>📋 系统日志</h3><button class="btn-secondary" onclick="loadLogs()" style="font-size:12px">🔄 刷新</button></div><div class="log-viewer" id="logViewer"><div class="line">加载中...</div></div></div></div><!-- Accounts --><div class="page" id="page-accounts"><div class="row"><div class="col"><div class="table-wrap"><div class="title"><h3>🔐 创建后台账号</h3></div><div style="padding:16px"><div class="form-group"><label>用户名</label><input type="text" id="acctUser" placeholder="newadmin"></div><div class="form-group"><label>密码</label><input type="password" id="acctPass" placeholder="********"></div><button class="btn-primary" onclick="createAccount()">创建账号</button></div></div></div><div class="col"><div class="table-wrap"><div class="title"><h3>已有账号</h3></div><table><thead><tr><th>用户名</th><th>角色</th><th>操作</th></tr></thead><tbody id="acctList"><tr><td colspan="3" style="text-align:center;color:#666;padding:20px">加载中...</td></tr></tbody></table></div></div></div></div></div></div><div id="toastContainer"></div><script>let token=localStorage.getItem("jx3_admin_token")||"";let user=localStorage.getItem("jx3_admin_user")||"admin";function showToast(msg,type="info"){var c=document.getElementById("toastContainer");var t=document.createElement("div");t.className="toast "+type;t.textContent=msg;c.appendChild(t);setTimeout(function(){t.remove()},3000)}function api(path,opts){opts=opts||{};var h={};if(token)h["Authorization"]="Bearer "+token;if(opts.body)h["Content-Type"]="application/json";return fetch("/api/admin"+path,{method:opts.method||"GET",headers:h,body:opts.body?JSON.stringify(opts.body):null}).then(function(r){if(r.status===401){localStorage.removeItem("jx3_admin_token");localStorage.removeItem("jx3_admin_user");checkLogin();return Promise.reject("unauthorized")}return r.json()})}function checkLogin(){if(!token){document.getElementById("loginOverlay").style.display="flex";document.getElementById("app").style.display="none"}else{document.getElementById("loginOverlay").style.display="none";document.getElementById("app").style.display="flex";document.getElementById("userDisplay").textContent=user}}function doLogin(){var u=document.getElementById("loginUser").value;var p=document.getElementById("loginPass").value;fetch("/api/admin/login",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({username:u,password:p})}).then(function(r){return r.json()}).then(function(d){if(d.code===0){token=d.token;user=u;localStorage.setItem("jx3_admin_token",token);localStorage.setItem("jx3_admin_user",u);checkLogin();loadDashboard()}else{document.getElementById("loginError").style.display="block"}}).catch(function(){document.getElementById("loginError").style.display="block"})}function logout(){token="";localStorage.removeItem("jx3_admin_token");localStorage.removeItem("jx3_admin_user");checkLogin()}function showPage(name,el){document.querySelectorAll(".page").forEach(function(p){p.classList.remove("active")});document.getElementById("page-"+name).classList.add("active");document.querySelectorAll(".sidebar a").forEach(function(a){a.classList.remove("active")});if(el)el.classList.add("active");var titles={dashboard:"仪表盘",players:"玩家管理",server:"服务器管理",giftcodes:"礼包码",logs:"系统日志",accounts:"账号管理"};document.getElementById("pageTitle").textContent=titles[name]||name;if(name==="dashboard")loadDashboard();if(name==="giftcodes")loadGiftCodes();if(name==="logs")loadLogs();if(name==="accounts")loadAccounts()}function loadDashboard(){api("/dashboard").then(function(d){var cards="";cards+="<div class='card'><div class='label'>在线玩家</div><div class='value'>"+d.onlinePlayers+"</div><div class='sub'></div><div class='icon-bg'>👥</div></div>";cards+="<div class='card'><div class='label'>总注册账号</div><div class='value'>"+(d.totalAccounts||"-")+"</div><div class='sub'>今日新注册: "+(d.todayNew||0)+"</div><div class='icon-bg'>📝</div></div>";cards+="<div class='card'><div class='label'>活跃同盟</div><div class='value'>"+(d.activeGuilds||"-")+"</div><div class='sub'></div><div class='icon-bg'>🏰</div></div>";cards+="<div class='card'><div class='label'>副本总次数</div><div class='value'>"+(d.totalDungeonRuns||"-")+"</div><div class='sub'></div><div class='icon-bg'>⚔️</div></div>";cards+="<div class='card'><div class='label'>交易笔数</div><div class='value'>"+(d.totalTrades||"-")+"</div><div class='sub'>交易额: "+(d.tradeVolume||0)+"</div><div class='icon-bg'>💰</div></div>";cards+="<div class='card'><div class='label'>运行时间</div><div class='value'>"+(d.uptimeHours||"-")+"h</div><div class='sub'>"+d.serverTime+"</div><div class='icon-bg'>⏱️</div></div>";document.getElementById("dashCards").innerHTML=cards}).catch(function(){document.getElementById("dashCards").innerHTML="<div style='text-align:center;padding:40px;color:#666'>加载失败</div>"})api("/server/info").then(function(d){var h="";for(var k in d){h+="<tr><td style='color:#888'>"+k+"</td><td>"+d[k]+"</td></tr>"}document.getElementById("serverInfoTable").innerHTML=h}).catch(function(){})}function searchPlayer(){var kw=document.getElementById("playerSearch").value;if(!kw){showToast("请输入关键词","error");return}api("/player/search?kw="+encodeURIComponent(kw)).then(function(list){var tbody=document.getElementById("playerResults");document.getElementById("searchCount").textContent=list.length+" 条";if(list.length===0){tbody.innerHTML="<tr><td colspan='5' style='text-align:center;color:#666;padding:30px'>未找到玩家</td></tr>";return}var h="";list.forEach(function(p){h+="<tr><td>"+(p.playerId||p.PlayerId)+"</td><td>"+(p.name||p.Name)+"</td><td>"+(p.level||p.Level)+"</td><td>"+(p.lastLogin||p.LastLogin||"-")+"</td><td><button class='btn-secondary' style='padding:4px 12px;font-size:12px' onclick='viewPlayer("+(p.playerId||p.PlayerId)+")'>详情</button></td></tr>"});tbody.innerHTML=h})}function viewPlayer(pid){api("/player/"+pid).then(function(d){var div=document.getElementById("playerDetailContent");div.innerHTML="<table><tr><td style='color:#888;width:100px'>ID</td><td>"+d.player.PlayerId+"</td></tr><tr><td style='color:#888'>名称</td><td>"+d.player.Name+"</td></tr><tr><td style='color:#888'>等级</td><td>"+d.player.Level+"</td></tr><tr><td style='color:#888'>金币</td><td>"+(d.player.Gold||0)+"</td></tr><tr><td style='color:#888'>英雄数</td><td>"+(d.player.HeroCount||0)+"</td></tr><tr><td style='color:#888'>状态</td><td>"+(d.player.IsBanned?"<span class='badge badge-red'>已封禁</span>":"<span class='badge badge-green'>正常</span>")+"</td></tr><tr><td style='color:#888'>创建时间</td><td>"+(d.player.CreateTime||"-")+"</td></tr></table>";if(d.heroes&&d.heroes.length){div.innerHTML+="<h4 style='color:#888;margin:12px 0 8px;font-size:13px'>英雄列表</h4><table><tr><th>ID</th><th>名称</th><th>等级</th><th>星级</th><th>战力</th></tr>";d.heroes.forEach(function(h){div.innerHTML+="<tr><td>"+h.HeroId+"</td><td>"+h.Name+"</td><td>"+h.Level+"</td><td>"+h.Star+"</td><td>"+h.Power+"</td></tr>"});div.innerHTML+="</table>"}div.innerHTML+="<div style='margin-top:12px'><button class='btn-danger' style='padding:6px 16px;font-size:13px' onclick='banPlayer("+pid+")'>封禁</button> <button class='btn-secondary' style='padding:6px 16px;font-size:13px' onclick='unbanPlayer("+pid+")'>解封</button></div>";document.getElementById("playerDetail").style.display="block"}).catch(function(){showToast("获取玩家详情失败","error")})}function banPlayer(pid){if(!confirm("确定封禁该玩家?"))return;api("/player/ban",{method:"POST",body:{pid:pid,reason:"违规操作",hours:24}}).then(function(d){showToast(d.msg||"已封禁",d.code===0?"success":"error");if(d.code===0)viewPlayer(pid)})}function unbanPlayer(pid){if(!confirm("确定解封该玩家?"))return;api("/player/unban",{method:"POST",body:{pid:pid}}).then(function(d){showToast(d.msg||"已解封",d.code===0?"success":"error");if(d.code===0)viewPlayer(pid)})}function sendNotice(){var title=document.getElementById("noticeTitle").value;var content=document.getElementById("noticeContent").value;var type=document.getElementById("noticeType").value;if(!title||!content){showToast("请填写完整","error");return}api("/notice",{method:"POST",body:{title:title,content:content,type:parseInt(type)}}).then(function(d){showToast(d.msg||"公告已发送",d.code===0?"success":"error");if(d.code===0){document.getElementById("noticeTitle").value="";document.getElementById("noticeContent").value=""}})}function loadGiftCodes(){api("/giftcodes").then(function(list){var tbody=document.getElementById("gcList");if(list.length===0){tbody.innerHTML="<tr><td colspan='6' style='text-align:center;color:#666;padding:20px'>暂无礼包码</td></tr>";return}var h="";list.forEach(function(g){h+="<tr><td>"+g.id+"</td><td><code>"+g.code+"</code></td><td>"+g.items+"</td><td>"+g.usedCount+"/"+g.useLimit+"</td><td>"+(g.active?"<span class='badge badge-green'>有效</span>":"<span class='badge badge-red'>已用完</span>")+"</td><td>"+g.createdAt+"</td></tr>"});tbody.innerHTML=h})}function createGiftCode(){var code=document.getElementById("gcCode").value;var items=document.getElementById("gcItems").value;var limit=parseInt(document.getElementById("gcLimit").value)||100;if(!code||!items){showToast("请填写完整","error");return}api("/giftcode",{method:"POST",body:{code:code,items:items,limit:limit}}).then(function(d){showToast(d.msg||"礼包码已创建",d.code===0?"success":"error");if(d.code===0){document.getElementById("gcCode").value="";document.getElementById("gcItems").value="";loadGiftCodes()}})}function loadLogs(){api("/server/logs?lines=100").then(function(logs){var div=document.getElementById("logViewer");var h="";logs.forEach(function(l){var lvlClass="lvl-"+((l.level||"").toLowerCase()==="error"?"error":(l.level||"").toLowerCase()==="warn"?"warn":"info");h+="<div class='line'><span class='time'>"+(l.time||"")+"</span><span class='"+lvlClass+"'>["+(l.level||"?")+"]</span> "+(l.msg||"")+"</div>"});div.innerHTML=h||"<div class='line'>无日志</div>"})}function loadAccounts(){api("/accounts").then(function(list){var tbody=document.getElementById("acctList");if(list.length===0){tbody.innerHTML="<tr><td colspan='3' style='text-align:center;color:#666;padding:20px'>暂无账号</td></tr>";return}var h="";list.forEach(function(a){h+="<tr><td>"+a.username+"</td><td><span class='badge badge-blue'>"+a.role+"</span></td><td>"+(a.username==="admin"?"-":"<button class='btn-danger' style='padding:4px 10px;font-size:12px' onclick='deleteAccount(\""+a.username+"\")'>删除</button>")+"</td></tr>"});tbody.innerHTML=h})}function createAccount(){var u=document.getElementById("acctUser").value;var p=document.getElementById("acctPass").value;if(!u||!p){showToast("请填写完整","error");return}api("/accounts",{method:"POST",body:{username:u,password:p}}).then(function(d){showToast(d.msg||"账号已创建",d.code===0?"success":"error");if(d.code===0){document.getElementById("acctUser").value="";document.getElementById("acctPass").value="";loadAccounts()}})}function deleteAccount(u){if(!confirm("确定删除账号 "+u+"?"))return;api("/accounts/"+encodeURIComponent(u),{method:"DELETE"}).then(function(d){showToast(d.msg||"已删除",d.code===0?"success":"error");loadAccounts()})}checkLogin();if(token)loadDashboard();document.getElementById("loginPass").addEventListener("keydown",function(e){if(e.key==="Enter")doLogin()});</script></body></html>
